name: Build Android APKs (master)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  aot:
    name: Build Native AOT APKs
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: android-arm64
            abi: arm64-v8a
            artifact_suffix: arm64
          - runtime: android-x64
            abi: x86_64
            artifact_suffix: x64
    env:
      DOTNET_VERSION: 10.0.x
      JAVA_VERSION: "21"
      TARGET_FRAMEWORK: net10.0-android
      PROJECT_PATH: OpenTalkie/OpenTalkie.csproj
      ANDROID_API_LEVEL: "36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "27.1.12297006"
      ANDROID_CMDLINE_TOOLS: "13114758"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          python <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("OpenTalkie/OpenTalkie.csproj").getroot()
          version = None
          for tag in ("ApplicationDisplayVersion", "Version"):
              element = root.find(f".//{tag}")
              if element is not None and element.text and element.text.strip():
                  version = element.text.strip()
                  break

          if not version:
              raise SystemExit("Could not determine application version from OpenTalkie.csproj")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail

          if command -v sudo >/dev/null 2>&1; then
            SUDO=sudo
          else
            SUDO=
          fi

          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends unzip wget

          ANDROID_SDK_ROOT="${RUNNER_TEMP}/android-sdk"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"

          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMDLINE_TOOLS}_latest.zip" -O "${RUNNER_TEMP}/android-commandlinetools.zip"
          unzip -q "${RUNNER_TEMP}/android-commandlinetools.zip" -d "${ANDROID_SDK_ROOT}/cmdline-tools"
          mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"

          export ANDROID_SDK_ROOT
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"

          set +o pipefail
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses > /dev/null
          set -o pipefail

          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}"

      - name: Install .NET MAUI Android workload
        run: dotnet workload install maui-android --skip-manifest-update

      - name: Restore project graph
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore "${PROJECT_PATH}"

      - name: Restore Native AOT runtime packs for ${{ matrix.runtime }}
        shell: bash
        run: |
          set -euo pipefail

          dotnet restore "${PROJECT_PATH}" \
            -r "${{ matrix.runtime }}" \
            -p:WorkflowRuntimeIdentifiers="${{ matrix.runtime }}" \
            -p:RuntimeIdentifier="${{ matrix.runtime }}" \
            -p:RuntimeIdentifiers="${{ matrix.runtime }}" \
            -p:NativeAotEnabled=true

      - name: Restore KeyStore
        id: signing
        shell: bash
        env:
          ANDROID_SIGNING_KEYSTORE: ${{ secrets.AndroidSigningKeyStore }}
        run: |
          set -euo pipefail

          if [[ -n "${ANDROID_SIGNING_KEYSTORE:-}" ]]; then
            KEYSTORE_PATH="${RUNNER_TEMP}/OpenTalkie.keystore"
            echo "${ANDROID_SIGNING_KEYSTORE}" | base64 --decode > "${KEYSTORE_PATH}"
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "path=${KEYSTORE_PATH}" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish Native AOT APK for ${{ matrix.runtime }}
        shell: bash
        env:
          KEYSTORE_ALIAS: ${{ secrets.AndroidSigningKeyAlias }}
          KEYSTORE_PASS: ${{ secrets.AndroidSigningKeyPassword }}
        run: |
          set -euo pipefail

          PUBLISH_DIR="${GITHUB_WORKSPACE}/artifacts/${{ matrix.runtime }}/publish"
          mkdir -p "${PUBLISH_DIR}"

          cmd=(
            dotnet publish "${PROJECT_PATH}"
            -c Release
            -f "${TARGET_FRAMEWORK}"
            -r "${{ matrix.runtime }}"
            -p:WorkflowRuntimeIdentifiers=${{ matrix.runtime }}
            -p:RuntimeIdentifier=${{ matrix.runtime }}
            -p:RuntimeIdentifiers=${{ matrix.runtime }}
            -p:NativeAotEnabled=true
            -p:AndroidCreatePackagePerAbi=false
            -p:AndroidPackageFormats=apk
            -p:AndroidSdkDirectory="${ANDROID_SDK_ROOT}"
            -p:PublishDir="${PUBLISH_DIR}/"
          )

          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            cmd+=(
              -p:AndroidKeyStore=true
              -p:AndroidSigningKeyAlias="${KEYSTORE_ALIAS}"
              -p:AndroidSigningKeyPass="${KEYSTORE_PASS}"
              -p:AndroidSigningKeyStore="${{ steps.signing.outputs.path }}"
              -p:AndroidSigningStorePass="${KEYSTORE_PASS}"
            )
          fi

          "${cmd[@]}"

      - name: Verify Native AOT ABI packaging for ${{ matrix.runtime }}
        shell: bash
        run: |
          set -euo pipefail

          PUBLISH_DIR="${GITHUB_WORKSPACE}/artifacts/${{ matrix.runtime }}/publish"
          APK_PATH=""
          while IFS= read -r candidate; do
            mapfile -t ABI_DIRS < <(unzip -Z1 "${candidate}" | awk -F/ '/^lib\/[^/]+\// { print $2 }' | sort -u)
            if [[ "${#ABI_DIRS[@]}" -eq 1 && "${ABI_DIRS[0]}" == "${{ matrix.abi }}" ]]; then
              APK_PATH="${candidate}"
              break
            fi
          done < <(find "${PUBLISH_DIR}" -maxdepth 1 -type f -name '*.apk' | sort)

          if [[ -z "${APK_PATH}" ]]; then
            echo "No single-ABI APK for '${{ matrix.abi }}' was produced in ${PUBLISH_DIR}."
            find "${PUBLISH_DIR}" -maxdepth 1 -type f -name '*.apk' -print
            exit 1
          fi

          FINAL_APK="${GITHUB_WORKSPACE}/artifacts/${{ matrix.runtime }}/OpenTalkie-${{ steps.app_version.outputs.version }}-${{ matrix.artifact_suffix }}.apk"
          cp "${APK_PATH}" "${FINAL_APK}"

          APK_SIZE="$(stat -c '%s' "${FINAL_APK}")"
          echo "APK verified: ${FINAL_APK} (${APK_SIZE} bytes)"

      - name: Upload Native AOT APK artifact for ${{ matrix.runtime }}
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenTalkie-${{ steps.app_version.outputs.version }}-${{ matrix.artifact_suffix }}
          path: artifacts/${{ matrix.runtime }}/OpenTalkie-${{ steps.app_version.outputs.version }}-${{ matrix.artifact_suffix }}.apk
          if-no-files-found: error

  compat:
    name: Build Compatibility APKs
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: android-arm
            abi: armeabi-v7a
            artifact_suffix: arm
          - runtime: android-x86
            abi: x86
            artifact_suffix: x86
    env:
      DOTNET_VERSION: 10.0.x
      JAVA_VERSION: "21"
      TARGET_FRAMEWORK: net10.0-android
      PROJECT_PATH: OpenTalkie/OpenTalkie.csproj
      ANDROID_API_LEVEL: "36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "27.1.12297006"
      ANDROID_CMDLINE_TOOLS: "13114758"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          python <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("OpenTalkie/OpenTalkie.csproj").getroot()
          version = None
          for tag in ("ApplicationDisplayVersion", "Version"):
              element = root.find(f".//{tag}")
              if element is not None and element.text and element.text.strip():
                  version = element.text.strip()
                  break

          if not version:
              raise SystemExit("Could not determine application version from OpenTalkie.csproj")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail

          if command -v sudo >/dev/null 2>&1; then
            SUDO=sudo
          else
            SUDO=
          fi

          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends unzip wget

          ANDROID_SDK_ROOT="${RUNNER_TEMP}/android-sdk"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"

          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMDLINE_TOOLS}_latest.zip" -O "${RUNNER_TEMP}/android-commandlinetools.zip"
          unzip -q "${RUNNER_TEMP}/android-commandlinetools.zip" -d "${ANDROID_SDK_ROOT}/cmdline-tools"
          mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"

          export ANDROID_SDK_ROOT
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"

          set +o pipefail
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses > /dev/null
          set -o pipefail

          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}"

      - name: Install .NET MAUI Android workload
        run: dotnet workload install maui-android --skip-manifest-update

      - name: Restore project graph
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore "${PROJECT_PATH}"

      - name: Restore compatibility runtime packs for ${{ matrix.runtime }}
        shell: bash
        run: |
          set -euo pipefail

          dotnet restore "${PROJECT_PATH}" \
            -p:WorkflowRuntimeIdentifiers="${{ matrix.runtime }}"

      - name: Restore KeyStore
        id: signing
        shell: bash
        env:
          ANDROID_SIGNING_KEYSTORE: ${{ secrets.AndroidSigningKeyStore }}
        run: |
          set -euo pipefail

          if [[ -n "${ANDROID_SIGNING_KEYSTORE:-}" ]]; then
            KEYSTORE_PATH="${RUNNER_TEMP}/OpenTalkie.keystore"
            echo "${ANDROID_SIGNING_KEYSTORE}" | base64 --decode > "${KEYSTORE_PATH}"
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "path=${KEYSTORE_PATH}" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish compatibility APK for ${{ matrix.runtime }}
        shell: bash
        env:
          KEYSTORE_ALIAS: ${{ secrets.AndroidSigningKeyAlias }}
          KEYSTORE_PASS: ${{ secrets.AndroidSigningKeyPassword }}
        run: |
          set -euo pipefail

          PUBLISH_DIR="${GITHUB_WORKSPACE}/artifacts/${{ matrix.runtime }}/publish"
          mkdir -p "${PUBLISH_DIR}"
          BUILD_STAMP="${PUBLISH_DIR}/build-start.stamp"
          touch "${BUILD_STAMP}"

          cmd=(
            dotnet build "${PROJECT_PATH}"
            --no-restore
            -t:SignAndroidPackage
            -c Release
            -f "${TARGET_FRAMEWORK}"
            -r "${{ matrix.runtime }}"
            -p:WorkflowRuntimeIdentifiers=${{ matrix.runtime }}
            -p:AndroidPackageFormats=apk
            -p:AndroidSdkDirectory="${ANDROID_SDK_ROOT}"
          )

          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            cmd+=(
              -p:AndroidKeyStore=true
              -p:AndroidSigningKeyAlias="${KEYSTORE_ALIAS}"
              -p:AndroidSigningKeyPass="${KEYSTORE_PASS}"
              -p:AndroidSigningKeyStore="${{ steps.signing.outputs.path }}"
              -p:AndroidSigningStorePass="${KEYSTORE_PASS}"
            )
          fi

          "${cmd[@]}"

      - name: Verify compatibility ABI packaging for ${{ matrix.runtime }}
        shell: bash
        run: |
          set -euo pipefail

          PUBLISH_DIR="${GITHUB_WORKSPACE}/artifacts/${{ matrix.runtime }}/publish"
          APK_PATH=""
          while IFS= read -r candidate; do
            mapfile -t ABI_DIRS < <(unzip -Z1 "${candidate}" | awk -F/ '/^lib\/[^/]+\// { print $2 }' | sort -u)
            if [[ "${#ABI_DIRS[@]}" -eq 1 && "${ABI_DIRS[0]}" == "${{ matrix.abi }}" ]]; then
              APK_PATH="${candidate}"
              break
            fi
          done < <(find "${GITHUB_WORKSPACE}/OpenTalkie/bin/Release" -type f -name '*.apk' -newer "${PUBLISH_DIR}/build-start.stamp" | sort)

          if [[ -z "${APK_PATH}" ]]; then
            echo "No single-ABI APK for '${{ matrix.abi }}' was produced for runtime '${{ matrix.runtime }}'."
            find "${GITHUB_WORKSPACE}/OpenTalkie/bin/Release" -type f -name '*.apk' -newer "${PUBLISH_DIR}/build-start.stamp" -print
            exit 1
          fi

          FINAL_APK="${GITHUB_WORKSPACE}/artifacts/${{ matrix.runtime }}/OpenTalkie-${{ steps.app_version.outputs.version }}-${{ matrix.artifact_suffix }}.apk"
          cp "${APK_PATH}" "${FINAL_APK}"

          APK_SIZE="$(stat -c '%s' "${FINAL_APK}")"
          echo "APK verified: ${FINAL_APK} (${APK_SIZE} bytes)"

      - name: Upload compatibility APK artifact for ${{ matrix.runtime }}
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenTalkie-${{ steps.app_version.outputs.version }}-${{ matrix.artifact_suffix }}
          path: artifacts/${{ matrix.runtime }}/OpenTalkie-${{ steps.app_version.outputs.version }}-${{ matrix.artifact_suffix }}.apk
          if-no-files-found: error
